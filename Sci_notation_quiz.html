<h1>Scientific Notation Quiz</h1>
<form id="SciNotationForm">
<p>1) What is 37,000 written in Scientific Notation?</p>
<label><input type="radio" name="q1" value="37x10^4">37x10^4</label>
<label><input type="radio" name="q1" value="37x10^3">37x10^3</label>
<label><input type="radio" name="q1" value="37x10^5">37x10^5</label>

<br><br>

<p>2) What is 45x10^3 written in standard form?</p>
<label><input type="radio" name="q2" value="45000">45,000</label>
<label><input type="radio" name="q2" value="4500000">4,500,000</label>
<label><input type="radio" name="q2" value="450000">450,000</label>

<br><br>

<p>3) What is 23x10^-2 in standard form?</p>
<label><input type="radio" name="q3" value="0.23">0.23</label>
<label><input type="radio" name="q3" value="0.0023">0.0023</label>
<label><input type="radio" name="q3" value="00.023">00.023</label>

<br><br>

<p>4) What is 0.25x10^-2 in standard form?</p>
<label><input type="radio" name="q4" value="0.0025">0.0025</label>
<label><input type="radio" name="q4" value="0.025">0.025</label>
<label><input type="radio" name="q4" value="0.00025">0.00025</label>

<br><br>

<p>5) What is sqrt(9)x10^3x10^3 in standard form?</p>
<label><input type="radio" name="q5" value="3000000">3,000,000</label>
<label><input type="radio" name="q5" value="30000000">30,000,000</label>
<label><input type="radio" name="q5" value="3000000000">300,000,000</label>

<br><br>

<input type="submit">
</form>
