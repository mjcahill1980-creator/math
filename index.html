<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-adsense-account" content="ca-pub-8228479055127150">
<meta name="description" content="Free Math Tutorials by Wyatt - Learn exponents, scientific notation, algebra, calculus, and more!">
<meta name="keywords" content="math help, math tutorial, exponents, scientific notation, algebra, calculus, Wyatt's Math">
<meta name="author" content="Wyatt">

<title>Math Tutorial Videos with Wyatt - Algebra, Geometry, Calculus, Addition, Subtraction, Multiplication, Division, and much more! </title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: White;
        margin: 20px;
        text-align: center;
        color: #fff;
    }

    h2 {
        margin-bottom: 15px;
        color: black;
    }

    select, button {
        padding: 10px 15px;
        font-size: 16px;
        margin: 10px 5px;
        cursor: pointer;
        border: none;
        border-radius: 10px;
        background-color: black;
        color: White;

     }

    button {
        background-color: #fff;
        color: #15b2eb;
        transition: 0.3s;
        border-radius: 100px;
    }

    button:hover {
        background-color: #f0f0f0;
    }

    .video-container {
        max-width: 800px;
        margin: 20px auto;
    }

    .video-container iframe {
        width: 100%;
        aspect-ratio: 16/9;
        display: none; /* hide all by default */
        border-radius: 10px;
    }
</style>

<script>
function updateSecondDropdown() {
    const first = document.getElementById("firstDropdown").value;
    const second = document.getElementById("secondDropdown");

    second.innerHTML = "";

    if (first === "algebra") {
        second.style.display = "inline";
        second.innerHTML += "<option value=''>-- Choose a lesson --</option>";
        second.innerHTML += "<option value='video1'>Exponents</option>";
        second.innerHTML += "<option value='video3'>Expressions</option>";
        second.innerHTML += "<option value='video2'>Scientific Notation</option>";
    } 
    else if (first === "calculus") {
        second.style.display = "inline";
        second.innerHTML += "<option value=''>-- Choose a lesson --</option>";
        second.innerHTML += "<option value=''>No content yet</option>";
    } 
    else {
        second.style.display = "none";
    }

    second.selectedIndex = 0;

    // hide all videos
    document.querySelectorAll(".video-container iframe").forEach(v => v.style.display = "none");
}

function selectFromDropdown() {
    const selected = document.getElementById("secondDropdown").value;

    document.querySelectorAll(".video-container iframe").forEach(v => v.style.display = "none");

    if (selected) {
        document.getElementById(selected).style.display = "block";
    }
}

function blue() {
    document.body.style.backgroundColor = "blue";
    document.body.style.color = "#fff";

    const dropdown = document.querySelector(".dropdown2");
    dropdown.style.backgroundColor = "white";
    dropdown.style.color = "black";        
}

function white() {
    document.body.style.backgroundColor = "white";
    document.body.style.color = "#000";

    const dropdown = document.querySelector(".dropdown2");
    dropdown.style.backgroundColor = "black";
    dropdown.style.color = "white";
}
</script>

</head>
<body>
<img src="logo.png" width="200px" align="center" alt="Learn math with Wyatt through video tutorials." />

<h2>Select a Math Video</h2>

<select id="firstDropdown" onchange="updateSecondDropdown()">
    <option value="">-- Choose a topic --</option>
    <option value="algebra">Algebra</option>
    <option value="calculus">Calculus</option>
</select>

<select id="secondDropdown" class="dropdown2" onchange="selectFromDropdown()" style="display:none;"></select>

<!-- Google AdSense (UNCHANGED) -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8228479055127150"
     crossorigin="anonymous"></script>

<!-- Videos -->
<div class="video-container">
    <iframe id="video1" src="https://www.youtube.com/embed/5dA6MUG6Ef8" allowfullscreen></iframe>
</div>

<div class="video-container">
    <iframe id="video2" src="https://www.youtube.com/embed/djIs7onQAvI" allowfullscreen></iframe>
</div>

<div class="video-container">
    <iframe id="video3" src="https://www.youtube.com/embed/w4-xolRiHGw" allowfullscreen></iframe>
</div>

</body>
</html>
