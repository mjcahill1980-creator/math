<title>Wyatt's Math Tutorials</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: blue;
        margin: 20px;
        text-align: center;
        color: #fff;
    }

    h2 {
        margin-bottom: 15px;
    }

    select, button {
        padding: 10px 15px;
        font-size: 16px;
        margin: 10px 5px;
        cursor: pointer;
        border: none;
        border-radius: 10px;
    }

    button {
        background-color: #fff;
        color: #15b2eb;
        transition: 0.3s;
        border-radius: 100px;
 }

    button:hover {
        background-color: #f0f0f0;
    }

    .video-container {
        max-width: 800px;
        margin: 20px auto;
    }

    .video-container iframe {
        width: 100%;
        aspect-ratio: 16/9;
        display: none;
        border-radius: 10px;
    }
</style>

<script>
function selectFromDropdown() {
    const selected = document.getElementById("dropdown").value;
    document.querySelectorAll(".video-container iframe").forEach(v => v.style.display = "none");

    if (selected) {
        document.getElementById(selected).style.display = "block";
    }
}

// Background color buttons
function blue() {
    document.body.style.backgroundColor = "blue";
    document.body.style.color = "#fff";
}

function white() {
    document.body.style.backgroundColor = "white";
    document.body.style.color = "#000";
    const style = document.createElement("style");
            style.textContent = `
                .dropdown2 {
                  background-color : black;
                  color: white;
                }
            `;
            document.head.appendChild(style);
        }

</script>

</head>
<body>
<h1>Welcome to Wyatt's Math Website!</h1>
<h2>Select a Math Video</h2>

<select id="dropdown" class = "dropdown2" onchange="selectFromDropdown()">
    <option value="">-- Choose a video --</option>
    <option value="video1">Exponents</option>
    <option value="video2">Scientific Notation</option>
    <option value="video3">Expressions</option>
</select>

<div>
    <button onclick="blue()">Blue Background</button>
    <button onclick="white()">White Background</button>
</div>
