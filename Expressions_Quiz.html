<h1>Expressions Quiz</h1>
<form id="ExpressionsForm">
<p>1) What type of expression is 2x+1?</p>
<label><input type="radio" name="q1" value="Monomial">Monomial</label>

<label><input type="radio" name="q1" value="Triomial">Triomial</label>

<br><br>

<p>2) What is the expression 2x^2+x+y^3 in standard form?</p>
<label><input type="radio" name="q2" value="2x^2+y^3+x">2x^2+y+y^3+x</label>

<br><br>
